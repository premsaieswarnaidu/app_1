name: CI Pipeline

on:
  pull_request:
    branches:
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ------------------------- Checkout -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------- Setup Node ------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ------------------------- Backend --------------------------
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Linter
        run: |
          cd backend
          npm run lint

      - name: Run Unit & Integration Tests
        run: |
          cd backend
          npm test

      # ------------------------- Frontend -------------------------
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # ------------------------- Docker Login ---------------------
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # ------------------------- Build && Scan Images ----------------
      - name: Build & Scan Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }} ./backend
          docker scan --accept-license ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}

      - name: Build & Scan Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }} ./frontend
          docker scan --accept-license ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      # ------------------------- Push Images -----------------------
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      # ------------------------- Update Manifests -----------------
      - name: Update Backend Manifest
        run: |
          sed -i "s|image:.*backend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}|" manifests/backend-deployment.yaml

      - name: Update Frontend Manifest
        run: |
          sed -i "s|image:.*frontend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}|" manifests/frontend-deployment.yaml

      - name: Commit Updated Manifests to develop
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add manifests/
          git commit -m "Update images to ${{ github.sha }}" || echo "No changes"
          git push

      # ------------------------- Merge develop -> main -----------------
      - name: Merge develop into main
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff develop -m "Merge develop into main after successful CI"
          git push origin main