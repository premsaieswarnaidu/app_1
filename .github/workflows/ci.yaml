name: CI Pipeline

on:
  push:
    branches:
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ------------------------- Checkout -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ------------------------- Setup Node ------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ------------------------- Backend --------------------------
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Linter
        run: |
          cd backend
          npm run lint

      - name: Run Backend Unit & Integration Tests
        run: |
          cd backend
          npm test

      # ------------------------- Frontend -------------------------
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      # ------------------------- Docker Login ---------------------
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # ------------------------- Build & Scan Images ----------------
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }} ./backend

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          scanners: 'vuln'

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }} ./frontend

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          scanners: 'vuln'

      # ------------------------- Push Images -----------------------
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      # ------------------------- Update Manifests -----------------
      - name: Update Backend Manifest
        run: |
          sed -i "s|image:.*backend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}|" manifests/backend-deployment.yaml

      - name: Update Frontend Manifest
        run: |
          sed -i "s|image:.*frontend.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}|" manifests/frontend-deployment.yaml

      # Step: create CI branch and commit
      - name: Create CI Branch and Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          SHORT_SHA=${GITHUB_SHA:0:7}           # bash substring
          CI_BRANCH="develop-ci-$SHORT_SHA"
          echo "CI_BRANCH=$CI_BRANCH" >> $GITHUB_ENV
          git checkout -b $CI_BRANCH
          git add manifests/
          git commit -m "Update images to $GITHUB_SHA" || echo "No changes"
          git push https://x-access-token:${{ secrets.CI_SUPER_USER }}@github.com/${{ github.repository }} HEAD:$CI_BRANCH
        env:
          GITHUB_SHA: ${{ github.sha }}

      # Step: create PR
      - name: Create PR from CI branch
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.CI_SUPER_USER }}
          commit-message: "Update images via CI"
          branch: ${{ env.CI_BRANCH }}           # use exported env variable
          base: develop
          title: "CI: Update images to ${{ github.sha }}"
          body: "This PR was automatically created by CI to update backend and frontend images."
          draft: false

      # ------------------------- Merge develop -> main -----------------
      - name: Merge develop into main
        if: ${{ steps.create_pr.outputs.pull-request-number != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.CI_SUPER_USER }}
        run: |
          git fetch origin main
          git checkout main
          git merge --no-ff develop -m "Merge develop into main after successful CI"
          git push https://x-access-token:${{ secrets.CI_SUPER_USER }}@github.com/${{ github.repository }} main