apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: premkoredla/frontend:0000c436a1c128688f3cde2dd033633e7891a5c2
        ports:
        - containerPort: 80
