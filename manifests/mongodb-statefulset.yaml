apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: default
spec:
  serviceName: "mongodb"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mongodb
        image: mongo:6
        imagePullPolicy: Always
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-pv
          mountPath: /data/db
        - name: tmp-volume
          mountPath: /tmp
        - name: run-volume
          mountPath: /var/run
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-root-username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-root-password

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"

        livenessProbe:
          exec:
            command:
              - sh
              - -c
              - >
                mongo -u "$MONGO_INITDB_ROOT_USERNAME"
                -p "$MONGO_INITDB_ROOT_PASSWORD"
                --authenticationDatabase admin
                --eval "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 30

        readinessProbe:
          exec:
            command:
              - sh
              - -c
              - >
                mongo -u "$MONGO_INITDB_ROOT_USERNAME"
                -p "$MONGO_INITDB_ROOT_PASSWORD"
                --authenticationDatabase admin
                --eval "db.adminCommand('ping')"
          initialDelaySeconds: 10
          periodSeconds: 20

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsUser: 999
          runAsGroup: 999
          readOnlyRootFilesystem: false   # IMPORTANT: Mongo needs write access

      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: run-volume
        emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: mongo-pv
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi