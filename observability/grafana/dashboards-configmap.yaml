apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      folder: ''
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /etc/grafana/provisioning/dashboards
  backend-dashboard.json: |
    {
      "title": "Backend Performance",
      "panels": [
        {
          "type": "graph",
          "title": "Request Rate",
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count[1m])) by (route)"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Average Request Duration",
          "targets": [
            {
              "expr": "rate(http_request_duration_seconds_sum[5m]) / rate(http_request_duration_seconds_count[5m])"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Latency (p95)",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route))"
            }
          ],
          "thresholds": [
            {
              "value": 0.2,
              "colorMode": "critical",
              "line": true,
              "op": "gt"
            }
          ],
          "alert": {
            "name": "LatencySLOBreached",
            "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route)) > 0.2",
            "for": "5m",
            "labels": {
              "severity": "critical"
            },
            "annotations": {
              "description": "Latency SLO breached: p95 > 200ms"
            }
          }
        },
        {
          "type": "graph",
          "title": "Error Rate (%)",
          "targets": [
            {
              "expr": "(sum(rate(http_request_duration_seconds_count{status_code=~\"5..\"}[5m])) / sum(rate(http_request_duration_seconds_count[5m]))) * 100"
            }
          ],
          "thresholds": [
            {
              "value": 1,
              "colorMode": "critical",
              "line": true,
              "op": "gt"
            }
          ],
          "alert": {
            "name": "ErrorRateSLOBreached",
            "expr": "(sum(rate(http_request_duration_seconds_count{status_code=~\"5..\"}[5m])) / sum(rate(http_request_duration_seconds_count[5m]))) * 100 > 1",
            "for": "5m",
            "labels": {
              "severity": "critical"
            },
            "annotations": {
              "description": "Error rate SLO breached: > 1%"
            }
          }
        }
      ]
    }
